<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — CollegeMarket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem">
    <div class="card" style="width:100%;max-width:440px">
      <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:0.5rem">Create account</h2>
      <p style="color:var(--text-muted);margin-bottom:1.5rem">Join your campus marketplace</p>
      <div id="error-msg"></div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@college.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label">College / University</label>
          <input type="text" id="college" class="form-control" placeholder="MIT, Stanford...">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">Create Account</button>
      </form>
      <p style="text-align:center;margin-top:1.25rem;color:var(--text-muted);font-size:0.9rem">
        Already have an account? <a href="/pages/login.html">Sign in</a>
      </p>
    </div>
  </div>
  <script src="/js/app.js?v=2"></script>
  <script>
    renderNavbar();
    if (isLoggedIn()) window.location.href = '/index.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Creating...';
      document.getElementById('error-msg').innerHTML = '';
      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            college: document.getElementById('college').value
          })
        });
        setAuth(data.token, data.user);
        window.location.href = '/index.html';
      } catch (err) {
        document.getElementById('error-msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
