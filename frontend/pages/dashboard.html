<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CollegeMarket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="container" style="padding-top:2rem;padding-bottom:3rem">
    <div id="profile-header" style="margin-bottom:2rem"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('listings', this)">My Listings</button>
      <button class="tab" onclick="switchTab('bids', this)">My Bids</button>
      <button class="tab" onclick="switchTab('won', this)">Won Auctions</button>
      <button class="tab" onclick="switchTab('profile', this)">Edit Profile</button>
    </div>

    <div id="tab-listings"></div>
    <div id="tab-bids" style="display:none"></div>
    <div id="tab-won" style="display:none"></div>
    <div id="tab-profile" style="display:none"></div>
  </div>

  <script src="/js/app.js?v=2"></script>
  <script>
    if (!requireAuth()) {}
    renderNavbar('dashboard');

    const user = getUser();
    let dashData = null;

    document.getElementById('profile-header').innerHTML = `
      <div style="display:flex;align-items:center;gap:1.25rem">
        ${user.avatar
          ? `<img src="http://localhost:8080${user.avatar}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--primary)">`
          : `<div style="width:64px;height:64px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700">${user.name[0]}</div>`}
        <div>
          <h2 style="font-size:1.4rem;font-weight:700">${user.name}</h2>
          <div style="color:var(--text-muted);font-size:0.9rem">${user.email} ${user.college ? '· ' + user.college : ''}</div>
        </div>
        <a href="/pages/sell.html" class="btn btn-primary" style="margin-left:auto">+ New Listing</a>
      </div>
    `;

    async function loadDashboard() {
      try {
        dashData = await apiFetch('/users/dashboard');
        renderListings();
        renderBids();
        renderWon();
        renderProfileForm();
      } catch (e) { showToast('Error', e.message, 'error'); }
    }

    function renderListings() {
      const el = document.getElementById('tab-listings');
      if (!dashData.listings.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No listings yet</p><a href="/pages/sell.html" class="btn btn-primary" style="margin-top:1rem">Create Listing</a></div>';
        return;
      }
      el.innerHTML = `<div class="grid-4">${dashData.listings.map(item => `
        <div class="item-card" style="position:relative">
          ${item.images?.[0] ? `<img src="http://localhost:8080${item.images[0]}" alt="${item.title}" style="width:100%;height:160px;object-fit:cover">` : `<div class="no-img" style="height:160px">📦</div>`}
          <div class="item-card-body">
            <div class="item-card-title">${item.title}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem">
              <span class="price">${item.listingType === 'FIXED' ? fmt(item.price) : fmt(item.currentBid)}</span>
              <span class="badge badge-${item.status.toLowerCase()}">${item.status}</span>
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
              <a href="/pages/item.html?id=${item.id}" class="btn btn-secondary btn-sm">View</a>
              <a href="/pages/sell.html?edit=${item.id}" class="btn btn-secondary btn-sm">Edit</a>
              <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Del</button>
            </div>
          </div>
        </div>`).join('')}</div>`;
    }

    function renderBids() {
      const el = document.getElementById('tab-bids');
      if (!dashData.biddedItems.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🔨</div><p>No bids placed yet</p></div>';
        return;
      }
      el.innerHTML = `<div style="display:flex;flex-direction:column;gap:1rem">${dashData.biddedItems.map(item => {
        const isWinning = item.highestBidder && item.highestBidder.id == user.id;
        return `
          <div class="card" style="display:flex;align-items:center;gap:1rem;padding:1rem">
            ${item.images?.[0] ? `<img src="http://localhost:8080${item.images[0]}" style="width:64px;height:64px;object-fit:cover;border-radius:8px">` : `<div style="width:64px;height:64px;background:var(--input-bg);border-radius:8px;display:flex;align-items:center;justify-content:center">📦</div>`}
            <div style="flex:1">
              <a href="/pages/item.html?id=${item.id}" style="font-weight:600">${item.title}</a>
              <div style="font-size:0.85rem;color:var(--text-muted);margin-top:0.25rem">
                Current bid: <strong>${fmt(item.currentBid)}</strong>
                ${item.endTime ? `· Ends: ${fmtDate(item.endTime)}` : ''}
              </div>
            </div>
            <div style="text-align:right">
              <span class="badge badge-${item.status.toLowerCase()}">${item.status}</span>
              ${isWinning ? `<div style="color:var(--success);font-size:0.8rem;margin-top:0.3rem">🏆 Highest Bidder</div>` : `<div style="color:var(--danger);font-size:0.8rem;margin-top:0.3rem">Outbid</div>`}
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    function renderWon() {
      const el = document.getElementById('tab-won');
      if (!dashData.wonAuctions.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>No won auctions yet</p></div>';
        return;
      }
      el.innerHTML = `<div class="grid-3">${dashData.wonAuctions.map(item => `
        <div class="card">
          ${item.images?.[0] ? `<img src="http://localhost:8080${item.images[0]}" style="width:100%;height:160px;object-fit:cover;border-radius:8px;margin-bottom:0.75rem">` : ''}
          <div style="font-weight:600;margin-bottom:0.4rem">${item.title}</div>
          <div style="color:var(--success);font-weight:700;font-size:1.1rem">${fmt(item.currentBid)}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem">Won on ${fmtDate(item.endTime)}</div>
          <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
            <a href="/pages/item.html?id=${item.id}" class="btn btn-secondary btn-sm">View</a>
            <button class="btn btn-primary btn-sm" onclick="checkout(${item.id})">Pay Now</button>
          </div>
        </div>`).join('')}</div>`;
    }

    function renderProfileForm() {
      const el = document.getElementById('tab-profile');
      el.innerHTML = `
        <div class="card" style="max-width:500px">
          <div id="profile-msg"></div>
          <form id="profile-form" enctype="multipart/form-data">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="p-name" class="form-control" value="${user.name || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">College</label>
              <input type="text" id="p-college" class="form-control" value="${user.college || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">Bio</label>
              <textarea id="p-bio" class="form-control">${user.bio || ''}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Profile Picture</label>
              <input type="file" id="p-avatar" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>`;

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('name', document.getElementById('p-name').value);
        formData.append('college', document.getElementById('p-college').value);
        formData.append('bio', document.getElementById('p-bio').value);
        const avatar = document.getElementById('p-avatar').files[0];
        if (avatar) formData.append('avatar', avatar);

        try {
          const token = getToken();
          const res = await fetch('http://localhost:8080/api/users/me', {
            method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: formData
          });
          const updated = await res.json();
          if (!res.ok) throw new Error(updated.message);
          localStorage.setItem('user', JSON.stringify({ ...user, ...updated }));
          showToast('Saved', 'Profile updated successfully', 'success');
          document.getElementById('profile-msg').innerHTML = '<div class="alert alert-success">Profile updated!</div>';
        } catch (err) {
          document.getElementById('profile-msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
      });
    }

    function switchTab(name, btn) {
      ['listings','bids','won','profile'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
      });
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    async function deleteItem(id) {
      if (!confirm('Delete this listing?')) return;
      try {
        await apiFetch(`/items/${id}`, { method: 'DELETE' });
        showToast('Deleted', 'Listing removed', 'success');
        loadDashboard();
      } catch (e) { showToast('Error', e.message, 'error'); }
    }

    async function checkout(itemId) {
      try {
        const res = await apiFetch('/payments/checkout', { method: 'POST', body: JSON.stringify({ itemId }) });
        window.location.href = res.url;
      } catch (e) { showToast('Error', e.message, 'error'); }
    }

    loadDashboard();
  </script>
</body>
</html>
