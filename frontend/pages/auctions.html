<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Auctions — CollegeMarket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="container" style="padding-top:2rem;padding-bottom:3rem">
    <div class="section-header">
      <h2 class="section-title">🔨 Live Auctions</h2>
      <div style="display:flex;gap:0.75rem">
        <select id="sort" class="form-control" onchange="loadAuctions()">
          <option value="">Newest</option>
          <option value="ending_soon">Ending Soon</option>
        </select>
      </div>
    </div>
    <div id="auctions-grid" class="grid-4">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="/js/app.js?v=2"></script>
  <script>
    renderNavbar('auctions');
    let items = [];

    async function loadAuctions() {
      const grid = document.getElementById('auctions-grid');
      grid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
      const sort = document.getElementById('sort').value;
      try {
        items = await apiFetch(`/items?listingType=AUCTION&sort=${sort}`);
        if (!items.length) { grid.innerHTML = '<div class="empty-state"><div class="icon">🔨</div><p>No active auctions</p></div>'; return; }
        grid.innerHTML = items.map(renderItemCard).join('');
        initCardTimers(items);
      } catch (e) {
        grid.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    // Listen for global auction status changes
    const sock = new SockJS('http://localhost:8080/ws');
    const stomp = Stomp.over(sock);
    stomp.debug = null;
    stomp.connect({}, () => {
      stomp.subscribe('/topic/auctions', (msg) => {
        const data = JSON.parse(msg.body);
        if (data.type === 'STATUS_CHANGE') {
          const card = document.querySelector(`[onclick*="id=${data.itemId}"]`);
          if (card) {
            const badge = card.querySelector('.badge-auction');
            if (badge) badge.outerHTML = `<span class="badge badge-ended">Ended</span>`;
            const timer = card.querySelector('.countdown');
            if (timer) { timer.textContent = 'ENDED'; timer.className = 'countdown ended'; }
          }
        }
      });
    });

    loadAuctions();
  </script>
</body>
</html>
