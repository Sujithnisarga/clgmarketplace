<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell — CollegeMarket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="container" style="padding-top:2rem;padding-bottom:3rem;max-width:700px">
    <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:1.5rem" id="page-title">Create Listing</h2>
    <div id="msg"></div>
    <div class="card">
      <form id="sell-form" enctype="multipart/form-data">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" id="title" class="form-control" placeholder="What are you selling?" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea id="description" class="form-control" placeholder="Describe your item..." required></textarea>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select id="category" class="form-control" required>
              <option value="">Select category</option>
              <option value="BOOKS">Books</option>
              <option value="ELECTRONICS">Electronics</option>
              <option value="CLOTHING">Clothing</option>
              <option value="FURNITURE">Furniture</option>
              <option value="SPORTS">Sports</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Listing Type *</label>
            <select id="listingType" class="form-control" onchange="toggleType()" required>
              <option value="FIXED">Fixed Price</option>
              <option value="AUCTION">Auction</option>
            </select>
          </div>
        </div>

        <!-- Fixed price -->
        <div id="fixed-section" class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input type="number" id="price" class="form-control" step="0.01" min="0.01" placeholder="0.00">
        </div>

        <!-- Auction section -->
        <div id="auction-section" style="display:none">
          <div class="form-group">
            <label class="form-label">Starting Bid (₹) *</label>
            <input type="number" id="startingBid" class="form-control" step="0.01" min="0.01" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Auction Duration</label>
            <select id="duration" class="form-control" onchange="toggleCustomEnd()">
              <option value="60">1 Hour</option>
              <option value="360">6 Hours</option>
              <option value="1440">24 Hours</option>
              <option value="4320">3 Days</option>
              <option value="10080">7 Days</option>
              <option value="custom">Custom End Time</option>
            </select>
          </div>
          <div id="custom-end" class="form-group" style="display:none">
            <label class="form-label">Custom End Date & Time</label>
            <input type="datetime-local" id="endTime" class="form-control">
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:0.75rem">
            <input type="checkbox" id="antiSnipe" style="width:18px;height:18px;cursor:pointer">
            <label for="antiSnipe" style="cursor:pointer;font-size:0.9rem">Enable Anti-Sniping (extend auction if bid in last 60s)</label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Images (up to 5)</label>
          <input type="file" id="images" class="form-control" accept="image/*" multiple>
          <div id="img-preview" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">Create Listing</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js?v=2"></script>
  <script>
    if (!requireAuth()) {}
    renderNavbar('sell');

    const editId = new URLSearchParams(location.search).get('edit');
    if (editId) {
      document.getElementById('page-title').textContent = 'Edit Listing';
      document.getElementById('submit-btn').textContent = 'Update Listing';
      loadEditData();
    }

    async function loadEditData() {
      try {
        const item = await apiFetch(`/items/${editId}`);
        document.getElementById('title').value = item.title;
        document.getElementById('description').value = item.description;
        document.getElementById('category').value = item.category;
        document.getElementById('listingType').value = item.listingType;
        if (item.listingType === 'FIXED') document.getElementById('price').value = item.price;
        toggleType();
      } catch (e) { showToast('Error', e.message, 'error'); }
    }

    function toggleType() {
      const type = document.getElementById('listingType').value;
      document.getElementById('fixed-section').style.display = type === 'FIXED' ? 'block' : 'none';
      document.getElementById('auction-section').style.display = type === 'AUCTION' ? 'block' : 'none';
    }

    function toggleCustomEnd() {
      document.getElementById('custom-end').style.display =
        document.getElementById('duration').value === 'custom' ? 'block' : 'none';
    }

    document.getElementById('images').addEventListener('change', (e) => {
      const preview = document.getElementById('img-preview');
      preview.innerHTML = '';
      [...e.target.files].slice(0, 5).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:6px;border:2px solid var(--border)';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    document.getElementById('sell-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving...';
      document.getElementById('msg').innerHTML = '';

      const type = document.getElementById('listingType').value;
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        listingType: type,
      };

      if (type === 'FIXED') {
        data.price = parseFloat(document.getElementById('price').value);
      } else {
        data.startingBid = parseFloat(document.getElementById('startingBid').value);
        const dur = document.getElementById('duration').value;
        if (dur === 'custom') {
          data.endTime = document.getElementById('endTime').value;
        } else {
          data.durationMinutes = parseInt(dur);
        }
        data.antiSnipe = document.getElementById('antiSnipe').checked;
        data.antiSnipeExtendMinutes = 5;
        data.antiSnipeThresholdSeconds = 60;
      }

      const formData = new FormData();
      formData.append('data', new Blob([JSON.stringify(data)], { type: 'application/json' }));
      const files = document.getElementById('images').files;
      for (let i = 0; i < Math.min(files.length, 5); i++) formData.append('images', files[i]);

      try {
        const method = editId ? 'PUT' : 'POST';
        const url = editId ? `/items/${editId}` : '/items';
        const token = getToken();
        const res = await fetch('http://localhost:8080/api' + url, {
          method,
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.message);
        window.location.href = `/pages/item.html?id=${result.id}`;
      } catch (err) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false; btn.textContent = editId ? 'Update Listing' : 'Create Listing';
      }
    });
  </script>
</body>
</html>
