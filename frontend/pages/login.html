<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CollegeMarket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem">
    <div class="card" style="width:100%;max-width:420px">
      <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:0.5rem">Welcome back</h2>
      <p style="color:var(--text-muted);margin-bottom:1.5rem">Sign in to your account</p>
      <div id="error-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@college.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:1.25rem;color:var(--text-muted);font-size:0.9rem">
        Don't have an account? <a href="/pages/register.html">Sign up</a>
      </p>
    </div>
  </div>
  <script src="/js/app.js?v=2"></script>
  <script>
    renderNavbar();
    if (isLoggedIn()) window.location.href = '/index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      document.getElementById('error-msg').innerHTML = '';
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        setAuth(data.token, data.user);
        window.location.href = '/index.html';
      } catch (err) {
        document.getElementById('error-msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
